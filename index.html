<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>captcha</title>
    <style>
        .container{
            text-align: center;
            margin-top: 100px;
            background-color: lightgray;
            width: 500px;
            height: 300px;
            position: relative;
            left: 25%;
            box-shadow:  5px 0 5px  black;

        }
        .box{
            width: 200px;
            height: 50px;
            border: 2px solid black;
            margin: 0 auto;
            font-size: 16px;
            line-height: 50px;
            user-select: none;
            margin-bottom: 20px;
            color: rgb(5, 12, 18);

        }
         .boxcont{
           position:absolute;
           top: 50px;
           left: 150px;
         }
         button{
            width: 120px;
            /* padding: 20px 30px */
            font-size: 16px;
            cursor: pointer;
         }

    </style>
</head>
<body>
    <div class="container">
        <div class="boxcont">
        <h1>Captcha</h1>
         <div class="box" id="captchdisplay"></div>
            <button onclick="cha()">New Captcha</button>
       </div>
        </div>
    <script>
        function cha(){
            const char='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let c='';
            for(let i=0;i<=6;i++){
               c+=char.charAt(Math.random()*char.length)
               console.log(char.charAt(Math.random()*char.length))
                document.getElementById("captchdisplay").innerText=c
            }
            
        }
        // document.getElementById("captchdisplay").innerText=c
    </script>
</body>
</html>
